{include file="../../../application/admin/view_new/public/head" /}

<div class="page-container p10">
    <form class="layui-form layui-form-pane" action="">
        <input type="hidden" name="__token__" value="{$Request.token}" />

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('admin/system/analytics_server_track')}：</label>
            <div class="layui-input-block">
                <input type="checkbox" name="analytics[server_track]" value="1" lay-skin="switch" {if condition="$config['analytics']['server_track'] eq '1'"}checked{/if}>
                <div style="float: none;" class="layui-form-mid layui-word-aux">{:lang('admin/system/analytics_server_track_tip')}</div>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('admin/system/analytics_track_region')}：</label>
            <div class="layui-input-block">
                <input type="checkbox" name="analytics[track_region]" value="1" lay-skin="switch" {if condition="$config['analytics']['track_region'] eq '1'"}checked{/if}>
                <div style="float: none;" class="layui-form-mid layui-word-aux">{:lang('admin/system/analytics_track_region_tip')}</div>
            </div>
        </div>

        <div class="layui-form-item center">
            <div class="layui-input-block">
                <button type="submit" class="layui-btn" lay-submit="" lay-filter="formSubmit">{:lang('btn_save')}</button>
                <button class="layui-btn layui-btn-warm" type="reset">{:lang('btn_reset')}</button>
            </div>
        </div>
    </form>
</div>

{include file="../../../application/admin/view_new/public/foot" /}
